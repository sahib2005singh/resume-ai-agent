services:
  - type: web
    name: resume-ai-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: JSEARCH_API_KEY
        sync: false
      - key: LLM_MODEL
        value: gemma-4-31b-it
